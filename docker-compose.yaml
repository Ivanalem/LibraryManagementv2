
  services:
    mysql:
      image: mysql:8.0
      container_name: mysql_base
      ports:
        - "${MYSQL_PORT:-3306}:3306"

      environment:
        MYSQL_USER: ${MYSQL_USER:-root}
        MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Alem4ikivan4ik}
        MYSQL_DATABASE: ${MYSQL_DATABASE:-petprojectschema}

      volumes:
        - mysql_data:/var/lib/mysql
      restart: unless-stopped

      command:
        --max_connections=100


  volumes:
    mysql_data:
